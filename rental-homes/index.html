<html lang="en">
<head>

    <title>Havenly Rentals | Find Your Next Home</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f7fb;
            color: #1e2a3e;
            line-height: 1.5;
        }

        /* ========== HEADER / NAVIGATION (matching homepage) ========== */
        .navbar {
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 48px;
        }

        .logo {
            width: 250px;
            height: 48px;
            object-fit: cover;
        }

        .logo span {
            color: #1e4a6b;
        }

        .nav-menu {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-menu a {
            text-decoration: none;
            color: #2c3e4e;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: #1e4a6b;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .login-link {
            color: #1e4a6b;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .login-link:hover {
            opacity: 0.8;
        }

        .save-favorites-btn {
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .save-favorites-btn:hover {
            background: #0f3b54;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px rgba(30, 74, 107, 0.2);
        }

        /* ========== MAIN LAYOUT ========== */
        .main-container {
            display: flex;
            min-height: calc(100vh - 74px);
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ========== SIDEBAR (refined, matching homepage aesthetics) ========== */
        .sidebar {
            width: 340px;
            background: white;
            padding: 32px 24px;
            border-right: 1px solid #e9edf2;
            overflow-y: auto;
            height: calc(100vh - 74px);
            position: sticky;
            top: 74px;
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e4a6b;
            margin-bottom: 24px;
            cursor: pointer;
            display: inline-block;
            border-bottom: 1.5px solid #1e4a6b;
            padding-bottom: 4px;
        }

        .search-box {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 48px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 28px;
            background: #fafcff;
            transition: all 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #1e4a6b;
            box-shadow: 0 0 0 3px rgba(30, 74, 107, 0.1);
        }

        .checkbox-group {
            margin-bottom: 28px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            margin-bottom: 14px;
            cursor: pointer;
            color: #2c3e4e;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e4a6b;
        }

        .options-section {
            margin-bottom: 28px;
        }

        .options-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 0;
            border-bottom: 1px solid #e9edf2;
            color: #1e2a3e;
        }

        .apply-search-btn {
            width: 100%;
            background: #1e4a6b;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 48px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .apply-search-btn:hover {
            background: #0f3b54;
            transform: translateY(-2px);
            box-shadow: 0 8px 18px -6px rgba(30, 74, 107, 0.3);
        }

        /* ========== CONTENT AREA ========== */
        .content {
            flex: 1;
            padding: 32px 36px;
            overflow-y: auto;
            background: #f5f7fb;
        }

        .content-top {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 32px;
        }

        .view-toggle {
            display: flex;
            gap: 12px;
        }

        .view-btn {
            padding: 8px 18px;
            border: 1px solid #dce3ec;
            background: white;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            color: #4b6b7c;
        }

        .view-btn i {
            margin-right: 6px;
        }

        .view-btn.active {
            background: #1e4a6b;
            color: white;
            border-color: #1e4a6b;
        }

        /* ========== PROPERTY CARDS (matching homepage style) ========== */
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .property-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid #eef2f8;
        }

        .property-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
            border-color: #cbdde6;
        }

        .property-image-container {
            position: relative;
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #d9e9f2 0%, #c2dbe8 100%);
            overflow: hidden;
        }

        .property-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .property-card:hover .property-image {
            transform: scale(1.02);
        }

        .property-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            color: white;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .property-badge.available-soon {
            background: #1e4a6b;
            color: white;
        }
        .property-badge.coming-soon {
            background: #8b6b4d;
        }
        .property-badge.apply-today {
            background: #2c7a4d;
        }

        .property-favorite {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            background: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            color: #aaa;
        }

        .property-favorite:hover {
            transform: scale(1.1);
            color: #e74c3c;
        }

        .property-favorite.liked {
            color: #e74c3c;
        }

        .property-specs-top {
            display: flex;
            gap: 20px;
            padding: 12px 18px;
            background: #fafcff;
            font-size: 0.8rem;
            color: #4b6b7c;
            border-bottom: 1px solid #eff3f8;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .property-content {
            padding: 18px 18px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .property-price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e4a6b;
            margin-bottom: 4px;
        }

        .property-fee-text {
            font-size: 0.7rem;
            color: #7e95a5;
            margin-bottom: 12px;
        }

            font-size: 0.9rem;
            font-weight: 500;
            color: #1e2a3e;
            margin-bottom: 14px;
            line-height: 1.4;
        }

            display: flex;
            gap: 18px;
            padding-top: 14px;
            border-top: 1px solid #eff3f8;
            font-size: 0.75rem;
            color: #5f7f90;
            margin-top: auto;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.9rem;
            color: #6c8e9e;
        }

        .loading-spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #e2edf2;
            border-top: 3px solid #1e4a6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            font-size: 0.95rem;
            color: #7e95a5;
            background: white;
            border-radius: 32px;
            grid-column: 1 / -1;
        }

        /* responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
                padding: 24px 18px;
            }
            .content {
                padding: 24px 28px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 14px 20px;
                flex-wrap: wrap;
                gap: 12px;
            }
            .navbar-left {
                gap: 24px;
            }
            .nav-menu {
                display: none;
            }
            .main-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: relative;
                top: 0;
                height: auto;
                border-right: none;
                border-bottom: 1px solid #e9edf2;
            }
            .content {
                padding: 24px 20px;
            }
            .properties-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    function generateProperty() {
        const price = Math.floor(Math.random() * (1860 - 1500 + 1)) + 1500;
        const city = cities[Math.floor(Math.random() * cities.length)];
        const state = states[Math.floor(Math.random() * states.length)];
        const bedroom = bedrooms[Math.floor(Math.random() * bedrooms.length)];
        const bathroom = bathrooms[Math.floor(Math.random() * bathrooms.length)];
        const sqft = Math.floor(Math.random() * (3500 - 1100 + 1)) + 1100;
        const badge = getRandomBadge();
        const imageSet = Images[Math.floor(Math.random() * Images.length)];
        return {
            id: Math.random().toString(36).substr(2, 9),
            address: `${Math.floor(Math.random() * 9000) + 1000} ${['Main', 'Oak', 'Elm', 'Maple', 'Pine'][Math.floor(Math.random() * 5)]} St, ${city}, ${state}`,
            price: price,
            beds: bedroom,
            baths: bathroom,
            sqft: sqft,
            city: city,
            state: state,
            images: imageSet,
            badge: badge,
            liked: false
        };
    }

    function generateProperties(count = 12) {
        const newProperties = [];
        for (let i = 0; i < count; i++) {
            newProperties.push(generateProperty());
        }
        return newProperties;
    }

    function renderProperties() {
        const container = document.getElementById('propertiesContainer');
        container.innerHTML = '';

        if (filteredProperties.length === 0) {
            container.innerHTML = '<div class="no-results" style="grid-column: 1 / -1;">🏡 No properties found matching your criteria. Try adjusting filters.</div>';
            return;
        }

        filteredProperties.forEach(property => {
            const card = document.createElement('div');
            card.className = 'property-card';
            const firstImage = property.images && property.images.length ? property.images[0] : '';
            card.innerHTML = `
                <div class="property-image-container">
                    <img src="${firstImage}" alt="Property" class="property-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%231e4a6b%22 width=%22400%22 height=%22300%22/%3E%3Ctext fill=%22white%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22%3EHavenly%3C/text%3E%3C/svg%3E'">
                    <div class="property-badge ${getBadgeClass(property.badge)}">${property.badge}</div>
                    <button class="property-favorite" onclick="event.stopPropagation()">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
                <div class="property-specs-top">
                    <div class="spec-item"><i class="fas fa-bed"></i> ${property.beds}</div>
                    <div class="spec-item"><i class="fas fa-bath"></i> ${property.baths}</div>
                    <div class="spec-item"><i class="fas fa-ruler-combined"></i> ${property.sqft.toLocaleString()} SqFt</div>
                </div>
                <div class="property-content">
                    <div class="property-price">$${property.price.toLocaleString()}<span style="font-size:0.9rem; font-weight:400;">/mo</span></div>
                    <div class="property-fee-text">Plus applicable fees</div>
                    <div class="property-address"><i class="fas fa-location-dot" style="color:#7e95a5; margin-right:6px;"></i>${property.address}</div>
                    <div class="property-specs-bottom">
                        <div class="spec-item"><i class="fas fa-bed"></i> ${property.beds} beds</div>
                        <div class="spec-item"><i class="fas fa-bath"></i> ${property.baths} baths</div>
                        <div class="spec-item"><i class="fas fa-vector-square"></i> ${property.sqft.toLocaleString()} sqft</div>
                    </div>
                </div>
            `;
            card.onclick = function(e){
                localStorage.randomProperty = JSON.stringify(property);
                location.href = "/homes-for-rent";
            };
            container.appendChild(card);
        });
    }

    function applyFilters() {
        filteredProperties = allProperties.slice();
        renderProperties();
    }

    function handleScroll() {
        const scrollPosition = window.innerHeight + window.scrollY;
        const pageHeight = document.documentElement.scrollHeight;
        if (scrollPosition >= pageHeight - 500 && !isLoading) {
            loadMoreProperties();
        }
    }

    function loadMoreProperties() {
        isLoading = true;
        document.getElementById('loadingIndicator').style.display = 'block';
        setTimeout(() => {
            const newProperties = generateProperties(12);
            allProperties = allProperties.concat(newProperties);
            applyFilters();
            document.getElementById('loadingIndicator').style.display = 'none';
            isLoading = false;
        }, 500);
    }

    window.addEventListener('scroll', handleScroll);
    allProperties = generateProperties(12);
    applyFilters();
</script>
</body>
</html>
